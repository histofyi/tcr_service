/* ---- house components, shared across the TCR pages ---------------------- */

/* A labelled key/value panel — the shape used for chain / structure info. */
.info-table {
  width: 100%;
  border-collapse: collapse;
}
.info-table td {
  padding: 3px 6px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: top;
}
.info-table td:first-child {
  color: #666677;
  width: 42%;
}
.info-table th {
  padding: 3px 6px;
  text-align: left;
  color: #666677;
  font-weight: 600;
  border-bottom: 1px solid #f0f0f0;
}

.panel-title {
  font-weight: 600;
}

/* Monospace identifiers (PDB codes, sequences, gene names). */
.mono {
  font-family: 'IBM Plex Mono', monospace;
}

/* Antigen-type dot (IBM palette, from config ANTIGEN_COLORS). */
.antigen-dot {
  display: inline-block;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 3px;
}

/* Small uppercase pill — "engineered variants", "non-canonical", etc. */
.flag {
  font-size: 8pt;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  background: rgba(120, 94, 240, 0.12);
  border: 1px solid #785ef0;
  border-radius: 3px;
  padding: 1px 5px;
  margin-left: 4px;
  white-space: nowrap;
}
.flag.is-noncanonical {
  background: rgba(220, 38, 127, 0.12);
  border-color: #dc267f;
}

/* Structure list — a table of the structures belonging to a TCR. */
.structure-table {
  width: 100%;
  border-collapse: collapse;
}
.structure-table th {
  text-align: left;
  font-weight: 600;
  color: #666677;
  border-bottom: 1px solid #cccccc;
  padding: 6px 10px 6px 0;
  white-space: nowrap;
}
/* Room in the first column for a selected row's marker bar, which would otherwise
   sit on top of the PDB code. The table is pulled back by the same amount so it
   still lines up with the heading above it. */
.structure-table { margin-left: -8px; }
.structure-table th:first-child,
.structure-table td:first-child { padding-left: 8px; }
.structure-table td {
  padding: 7px 10px 7px 0;
  border-bottom: 1px solid #eeeeee;
  vertical-align: middle;
}
/* A publication row is two lines deep, so its PDB ids sit against the top of the
   title rather than floating in the middle of it, with room before the title
   starts. The header cell gets the same gutter so the column still lines up. */
.structure-table.is-publications td {
  vertical-align: top;
  padding-top: 10px;
}
.structure-table.is-publications th:first-child,
.structure-table.is-publications td:first-child {
  padding-right: 24px;
}
.structure-table tr:hover td {
  background: #fafafa;
}
.structure-table .pdb a {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
}

/* Mol* viewer container. molstar.css is loaded after the histo stylesheet, so the
   chrome overrides below are scoped + !important to win. */
.molstar-box {
  position: relative;
  width: 100%;
  height: 460px;
  overflow: hidden;
  background: #ffffff;
  border: 1px solid #e6e6ee;
}
.molstar-box.is-tall { height: 620px; }
.molstar-box.is-short { height: 340px; }
.molstar-box .msp-plugin,
.molstar-box .msp-viewport { background: #ffffff !important; }
.molstar-box .msp-layout-standard { border: none !important; }
.molstar-box .msp-btn,
.molstar-box .msp-viewport-controls-buttons button { background: #ffffff !important; }
.molstar-box .msp-btn:hover,
.molstar-box .msp-viewport-controls-buttons button:hover {
  background: #f0f0f2 !important;
  outline: none !important;
}
.molstar-box .msp-btn svg,
.molstar-box .msp-btn-icon svg,
.molstar-box .msp-viewport-controls-buttons svg {
  fill: #6b6f7e !important;
  stroke: #6b6f7e !important;
}
.molstar-box .msp-viewport-controls-buttons button:hover svg {
  fill: #0a0039 !important;
  stroke: #0a0039 !important;
}
.molstar-box .msp-btn-icon,
.molstar-box .msp-btn-link,
.molstar-box .msp-btn-link-toggle-off,
.molstar-box .msp-btn-link-toggle-on { color: #6b6f7e !important; }
.molstar-box .msp-highlight-info,
.molstar-box .msp-hover-box-body,
.molstar-box .msp-highlight-simple-row {
  background: #ffffff !important;
  color: #0a0039 !important;
}
/* the screenshot button has no viewportShow* flag — hide it here */
.molstar-box [title="Screenshot"] { display: none !important; }

/* Chain legend under a Mol* viewer. */
.mol-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  font-size: 10pt;
  color: #333355;
  margin: 6px 0 0;
}
.mol-legend .swatch {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 2px;
  margin-right: 5px;
  vertical-align: -1px;
}
